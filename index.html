<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether — Weather</title>
<link rel="icon" href="cloud.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Sky -->
<div class="sky-bg" id="skyBg"></div>
<div class="stars" id="stars"></div>
<div class="clouds" id="clouds"></div>
<div class="rain-wrap" id="rainWrap"></div>
<div class="snow-wrap" id="snowWrap"></div>

<div class="app">
  <div class="brand">Weather App</div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search city… e.g. London, Tokyo" autocomplete="off" />
    <button class="search-btn" id="searchBtn" title="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>

  <div class="unit-toggle">
    <button class="unit-btn active" id="btnC" onclick="switchUnit('metric')">°C</button>
    <button class="unit-btn" id="btnF" onclick="switchUnit('imperial')">°F</button>
  </div>

  <div id="statusMsg" class="status-msg" style="display:none;"></div>

  <div class="weather-card" id="weatherCard">
    <div class="city-row">
      <span class="city-name" id="cityName">—</span>
      <span class="country-code" id="countryCode"></span>
    </div>
    <div class="date-time" id="dateTime"></div>

    <div class="temp-row">
      <div class="weather-icon-big" id="iconBig">🌤</div>
      <div class="temp-block">
        <div class="temp-val"><span id="tempVal">—</span><span class="temp-unit" id="tempUnit">°C</span></div>
        <div class="desc" id="descText">—</div>
        <div class="feels" id="feelsLike"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-icon">💧</div>
        <div class="stat-val" id="humidity">—</div>
        <div class="stat-lbl">Humidity</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">💨</div>
        <div class="stat-val" id="windSpeed">—</div>
        <div class="stat-lbl">Wind</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">👁</div>
        <div class="stat-val" id="visibility">—</div>
        <div class="stat-lbl">Visibility</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🌡</div>
        <div class="stat-val" id="pressure">—</div>
        <div class="stat-lbl">Pressure</div>
      </div>
    </div>

    <div class="forecast-title">5-Day Forecast</div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
