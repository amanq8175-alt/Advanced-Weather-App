<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether — Weather</title>
<link rel="icon" href="cloud.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0a0f2e;
    --mid: #1a2a6c;
    --glow: #4fc3f7;
    --accent: #f9a825;
    --text: #e8f4fd;
    --muted: rgba(232,244,253,0.55);
    --card: rgba(255,255,255,0.06);
    --border: rgba(79,195,247,0.18);
    --radius: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sky);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── ANIMATED SKY BACKGROUND ── */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, #0a0f2e 0%, #1a2a6c 50%, #0d1b3e 100%);
    transition: background 1.5s ease;
  }
  .sky-bg.day    { background: linear-gradient(160deg, #1565c0 0%, #42a5f5 45%, #80d8ff 100%); }
  .sky-bg.sunset { background: linear-gradient(160deg, #bf360c 0%, #e64a19 30%, #ff8f00 70%, #ffd54f 100%); }
  .sky-bg.cloudy { background: linear-gradient(160deg, #37474f 0%, #546e7a 50%, #607d8b 100%); }
  .sky-bg.rainy  { background: linear-gradient(160deg, #1a237e 0%, #283593 40%, #3949ab 100%); }
  .sky-bg.snowy  { background: linear-gradient(160deg, #b0bec5 0%, #cfd8dc 50%, #eceff1 100%); --text: #263238; }

  /* Stars */
  .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    opacity: var(--op, 0.7);
  }
  @keyframes twinkle { from { opacity: var(--op, 0.7); transform: scale(1); } to { opacity: 0.1; transform: scale(0.5); } }

  /* Clouds */
  .clouds { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .cloud {
    position: absolute; background: rgba(255,255,255,0.12); border-radius: 50px;
    filter: blur(8px);
    animation: drift linear infinite;
  }
  @keyframes drift { from { transform: translateX(-300px); } to { transform: translateX(110vw); } }

  /* Rain */
  .rain-wrap { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; display: none; }
  .rain-drop {
    position: absolute; width: 1.5px; background: linear-gradient(to bottom, transparent, rgba(130,200,255,0.7));
    border-radius: 2px; animation: fall linear infinite;
  }
  @keyframes fall { from { transform: translateY(-20px); opacity: 1; } to { transform: translateY(110vh); opacity: 0.3; } }

  /* Snow */
  .snow-wrap { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; display: none; }
  .snowflake {
    position: absolute; color: rgba(255,255,255,0.8); font-size: 14px;
    animation: snowfall linear infinite;
  }
  @keyframes snowfall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 16px 60px;
  }

  /* ── HEADER ── */
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, var(--glow), #b3e5fc, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 36px;
    animation: fadeDown 0.7s ease both;
  }

  /* ── SEARCH ── */
  .search-wrap {
    width: 100%; max-width: 520px;
    position: relative; margin-bottom: 40px;
    animation: fadeDown 0.8s ease 0.1s both;
  }
  .search-input {
    width: 100%; padding: 16px 56px 16px 22px;
    background: rgba(255,255,255,0.08); border: 1.5px solid var(--border);
    border-radius: 50px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    outline: none; backdrop-filter: blur(12px);
    transition: border 0.3s, box-shadow 0.3s, background 0.3s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: var(--glow);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.15);
    background: rgba(255,255,255,0.11);
  }
  .search-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--glow), #0288d1);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .search-btn:hover { transform: translateY(-50%) scale(1.1); box-shadow: 0 4px 18px rgba(79,195,247,0.45); }
  .search-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

  /* ── MAIN CARD ── */
  .weather-card {
    width: 100%; max-width: 520px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); backdrop-filter: blur(20px);
    padding: 36px 32px 32px;
    animation: fadeUp 0.6s ease both;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    display: none;
  }
  .weather-card.visible { display: block; }

  .city-row {
    display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;
  }
  .city-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 2.4rem);
    font-weight: 700; line-height: 1.1;
  }
  .country-code {
    font-size: 0.9rem; color: var(--muted); font-weight: 500; letter-spacing: 0.08em;
  }
  .date-time { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; }

  /* Big temperature */
  .temp-row {
    display: flex; align-items: flex-start; gap: 20px; margin-bottom: 8px;
  }
  .weather-icon-big { font-size: 72px; line-height: 1; animation: floatIcon 4s ease-in-out infinite; }
  @keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .temp-block {}
  .temp-val {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 12vw, 5rem);
    font-weight: 700; line-height: 1;
    background: linear-gradient(135deg, #fff 30%, var(--glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .temp-unit { font-size: 1.4rem; vertical-align: super; }
  .desc { font-size: 1rem; color: var(--muted); margin-top: 4px; text-transform: capitalize; }
  .feels { font-size: 0.85rem; color: var(--muted); }

  /* ── STATS GRID ── */
  .stats {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-top: 28px;
  }
  @media (min-width: 420px) { .stats { grid-template-columns: repeat(4, 1fr); } }

  .stat-box {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 12px; text-align: center;
    transition: background 0.3s, transform 0.2s;
  }
  .stat-box:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
  .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
  .stat-val { font-size: 1rem; font-weight: 500; }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.07em; }

  /* ── FORECAST ── */
  .forecast-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-top: 28px; margin-bottom: 12px;
  }
  .forecast-row {
    display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .forecast-row::-webkit-scrollbar { display: none; }
  .fc-item {
    flex: 0 0 auto; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; text-align: center; min-width: 70px;
    transition: background 0.3s, transform 0.2s;
  }
  .fc-item:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
  .fc-day { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
  .fc-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .fc-temp { font-size: 0.9rem; font-weight: 500; }

  /* ── ERROR / LOADER ── */
  .status-msg {
    width: 100%; max-width: 520px; text-align: center;
    padding: 20px; font-size: 0.95rem; color: var(--muted);
    animation: fadeUp 0.4s ease both;
  }
  .loader {
    width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--glow); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── UNIT TOGGLE ── */
  .unit-toggle {
    display: flex; gap: 6px; margin-bottom: 32px;
    animation: fadeDown 0.9s ease 0.15s both;
  }
  .unit-btn {
    padding: 7px 18px; border-radius: 50px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 0.85rem;
    transition: all 0.25s;
  }
  .unit-btn.active {
    background: rgba(79,195,247,0.2); border-color: var(--glow);
    color: var(--text);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); }  to { opacity: 1; transform: translateY(0); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .app { padding: 28px 12px 50px; }
    .weather-card { padding: 26px 20px 24px; }
  }
</style>
</head>
<body>

<!-- Sky -->
<div class="sky-bg" id="skyBg"></div>
<div class="stars" id="stars"></div>
<div class="clouds" id="clouds"></div>
<div class="rain-wrap" id="rainWrap"></div>
<div class="snow-wrap" id="snowWrap"></div>

<div class="app">
  <div class="brand">Weather App</div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search city… e.g. London, Tokyo" autocomplete="off" />
    <button class="search-btn" id="searchBtn" title="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>

  <div class="unit-toggle">
    <button class="unit-btn active" id="btnC" onclick="switchUnit('metric')">°C</button>
    <button class="unit-btn" id="btnF" onclick="switchUnit('imperial')">°F</button>
  </div>

  <div id="statusMsg" class="status-msg" style="display:none;"></div>

  <div class="weather-card" id="weatherCard">
    <div class="city-row">
      <span class="city-name" id="cityName">—</span>
      <span class="country-code" id="countryCode"></span>
    </div>
    <div class="date-time" id="dateTime"></div>

    <div class="temp-row">
      <div class="weather-icon-big" id="iconBig">🌤</div>
      <div class="temp-block">
        <div class="temp-val"><span id="tempVal">—</span><span class="temp-unit" id="tempUnit">°C</span></div>
        <div class="desc" id="descText">—</div>
        <div class="feels" id="feelsLike"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-icon">💧</div>
        <div class="stat-val" id="humidity">—</div>
        <div class="stat-lbl">Humidity</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">💨</div>
        <div class="stat-val" id="windSpeed">—</div>
        <div class="stat-lbl">Wind</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">👁</div>
        <div class="stat-val" id="visibility">—</div>
        <div class="stat-lbl">Visibility</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🌡</div>
        <div class="stat-val" id="pressure">—</div>
        <div class="stat-lbl">Pressure</div>
      </div>
    </div>

    <div class="forecast-title">5-Day Forecast</div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Using Open-Meteo (free, no key) + geocoding API
const GEO_URL  = 'https://geocoding-api.open-meteo.com/v1/search';
const WTHR_URL = 'https://api.open-meteo.com/v1/forecast';

let unit = 'metric'; // metric | imperial
let lastLat = null, lastLon = null;
let lastCity = '', lastCountry = '';

// ── BACKGROUND INIT ──────────────────────────────────────────────────────────
function makeStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      --dur:${2+Math.random()*4}s; --op:${0.3+Math.random()*0.7};
      animation-delay:${-Math.random()*6}s;
    `;
    c.appendChild(s);
  }
}

function makeClouds(n=5, opacity=0.12) {
  const c = document.getElementById('clouds');
  c.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const cl = document.createElement('div');
    cl.className = 'cloud';
    const w = 120 + Math.random()*200, h = w*0.35;
    cl.style.cssText = `
      width:${w}px; height:${h}px; top:${5+Math.random()*50}%;
      background:rgba(255,255,255,${opacity});
      animation-duration:${40+Math.random()*60}s;
      animation-delay:${-Math.random()*60}s;
    `;
    c.appendChild(cl);
  }
}

function makeRain(active) {
  const w = document.getElementById('rainWrap');
  w.style.display = active ? 'block' : 'none';
  if (!active) return;
  w.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const d = document.createElement('div');
    d.className = 'rain-drop';
    const h = 15 + Math.random()*25;
    d.style.cssText = `
      left:${Math.random()*100}%; height:${h}px;
      animation-duration:${0.5+Math.random()*0.7}s;
      animation-delay:${-Math.random()*1.5}s;
    `;
    w.appendChild(d);
  }
}

function makeSnow(active) {
  const w = document.getElementById('snowWrap');
  w.style.display = active ? 'block' : 'none';
  if (!active) return;
  w.innerHTML = '';
  const flakes = ['❄','❅','❆','*'];
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'snowflake';
    s.textContent = flakes[Math.floor(Math.random()*flakes.length)];
    s.style.cssText = `
      left:${Math.random()*100}%; font-size:${10+Math.random()*14}px;
      animation-duration:${3+Math.random()*5}s;
      animation-delay:${-Math.random()*6}s;
    `;
    w.appendChild(s);
  }
}

makeStars(); makeClouds();

// ── WEATHER CODE MAPPING ─────────────────────────────────────────────────────
function decodeWMO(code, isDay=1) {
  const map = {
    0:  { icon: isDay?'☀️':'🌙', desc:'Clear sky',       sky:'day'  },
    1:  { icon:'🌤',             desc:'Mainly clear',    sky:'day'  },
    2:  { icon:'⛅',             desc:'Partly cloudy',   sky:'day'  },
    3:  { icon:'☁️',             desc:'Overcast',        sky:'cloudy'},
    45: { icon:'🌫',             desc:'Fog',             sky:'cloudy'},
    48: { icon:'🌫',             desc:'Icy fog',         sky:'cloudy'},
    51: { icon:'🌦',             desc:'Light drizzle',   sky:'rainy' },
    53: { icon:'🌦',             desc:'Drizzle',         sky:'rainy' },
    55: { icon:'🌧',             desc:'Heavy drizzle',   sky:'rainy' },
    61: { icon:'🌧',             desc:'Slight rain',     sky:'rainy' },
    63: { icon:'🌧',             desc:'Rain',            sky:'rainy' },
    65: { icon:'🌧',             desc:'Heavy rain',      sky:'rainy' },
    71: { icon:'🌨',             desc:'Slight snow',     sky:'snowy' },
    73: { icon:'❄️',             desc:'Snow',            sky:'snowy' },
    75: { icon:'❄️',             desc:'Heavy snow',      sky:'snowy' },
    77: { icon:'🌨',             desc:'Snow grains',     sky:'snowy' },
    80: { icon:'🌦',             desc:'Rain showers',    sky:'rainy' },
    81: { icon:'🌧',             desc:'Rain showers',    sky:'rainy' },
    82: { icon:'⛈',             desc:'Heavy showers',   sky:'rainy' },
    85: { icon:'🌨',             desc:'Snow showers',    sky:'snowy' },
    86: { icon:'❄️',             desc:'Heavy snow shower',sky:'snowy'},
    95: { icon:'⛈',             desc:'Thunderstorm',    sky:'rainy' },
    96: { icon:'⛈',             desc:'Thunderstorm+hail',sky:'rainy'},
    99: { icon:'⛈',             desc:'Heavy thunderstorm',sky:'rainy'},
  };
  return map[code] || { icon:'🌈', desc:'Unknown', sky:'day' };
}

// ── SKY THEME ────────────────────────────────────────────────────────────────
function applySky(sky, code) {
  const bg = document.getElementById('skyBg');
  bg.className = 'sky-bg ' + sky;
  const isNight = sky === 'day' && code === 0; // night = clear + code 0 with isDay=0
  document.getElementById('stars').style.opacity = (sky === 'cloudy' || sky === 'day') ? '0.3' : '1';
  makeClouds(sky === 'cloudy' ? 9 : sky === 'rainy' ? 7 : 3,
             sky === 'cloudy' ? 0.2 : sky === 'snowy' ? 0.35 : 0.1);
  makeRain(sky === 'rainy');
  makeSnow(sky === 'snowy');
}

// ── UI ────────────────────────────────────────────────────────────────────────
function showStatus(msg, loading=false) {
  const el = document.getElementById('statusMsg');
  el.style.display = 'block';
  el.innerHTML = loading
    ? `<div class="loader"></div>${msg}`
    : msg;
  document.getElementById('weatherCard').classList.remove('visible');
}

function hideStatus() {
  document.getElementById('statusMsg').style.display = 'none';
}

function switchUnit(u) {
  unit = u;
  document.getElementById('btnC').classList.toggle('active', u==='metric');
  document.getElementById('btnF').classList.toggle('active', u==='imperial');
  if (lastLat !== null) fetchWeather(lastLat, lastLon, lastCity, lastCountry);
}

function updateDateTime(tz) {
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric',
                 hour:'2-digit', minute:'2-digit', timeZone: tz||'UTC' };
  document.getElementById('dateTime').textContent = now.toLocaleString('en-US', opts);
}

// ── GEOCODING ────────────────────────────────────────────────────────────────
async function searchCity(query) {
  showStatus('Locating city…', true);
  try {
    const res = await fetch(`${GEO_URL}?name=${encodeURIComponent(query)}&count=1&language=en`);
    const d = await res.json();
    if (!d.results?.length) { showStatus('City not found. Try another name.'); return; }
    const { latitude, longitude, name, country_code, timezone } = d.results[0];
    lastLat = latitude; lastLon = longitude;
    lastCity = name; lastCountry = country_code;
    await fetchWeather(latitude, longitude, name, country_code, timezone);
  } catch(e) {
    showStatus('Network error. Please try again.');
  }
}

// ── WEATHER FETCH ────────────────────────────────────────────────────────────
async function fetchWeather(lat, lon, city, country, tz='auto') {
  showStatus('Fetching weather…', true);
  const tempParam = unit === 'metric' ? 'celsius' : 'fahrenheit';
  const windParam = unit === 'metric' ? 'kmh' : 'mph';
  try {
    const url = `${WTHR_URL}?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
      + `wind_speed_10m,surface_pressure,visibility,weather_code,is_day`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
      + `&temperature_unit=${tempParam}&wind_speed_unit=${windParam}`
      + `&timezone=${encodeURIComponent(tz)}&forecast_days=6`;

    const res = await fetch(url);
    const d = await res.json();
    renderWeather(d, city, country, tz);
  } catch(e) {
    showStatus('Could not load weather data. Check your connection.');
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderWeather(d, city, country, tz) {
  hideStatus();
  const c = d.current;
  const code = c.weather_code;
  const isDay = c.is_day;
  const info = decodeWMO(code, isDay);

  document.getElementById('cityName').textContent = city;
  document.getElementById('countryCode').textContent = country;
  document.getElementById('tempVal').textContent = Math.round(c.temperature_2m);
  document.getElementById('tempUnit').textContent = unit === 'metric' ? '°C' : '°F';
  document.getElementById('descText').textContent = info.desc;
  document.getElementById('iconBig').textContent = info.icon;
  document.getElementById('feelsLike').textContent =
    `Feels like ${Math.round(c.apparent_temperature)}${unit==='metric'?'°C':'°F'}`;
  document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
  document.getElementById('windSpeed').textContent =
    Math.round(c.wind_speed_10m) + (unit==='metric'?' km/h':' mph');
  document.getElementById('visibility').textContent =
    c.visibility >= 1000 ? (c.visibility/1000).toFixed(1)+' km' : c.visibility+' m';
  document.getElementById('pressure').textContent = Math.round(c.surface_pressure) + ' hPa';

  // Forecast
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fr = document.getElementById('forecastRow');
  fr.innerHTML = '';
  const today = new Date().getDay();
  for (let i = 1; i < 6; i++) {
    const di = decodeWMO(d.daily.weather_code[i]);
    const dayLabel = i === 1 ? 'Tmrw' : days[(today + i) % 7];
    const max = Math.round(d.daily.temperature_2m_max[i]);
    const min = Math.round(d.daily.temperature_2m_min[i]);
    const u = unit==='metric'?'°':'°';
    fr.innerHTML += `
      <div class="fc-item">
        <div class="fc-day">${dayLabel}</div>
        <div class="fc-icon">${di.icon}</div>
        <div class="fc-temp">${max}${u} <span style="opacity:.55">${min}${u}</span></div>
      </div>`;
  }

  updateDateTime(tz);
  applySky(!isDay ? 'night' : info.sky, code);
  document.getElementById('weatherCard').classList.add('visible');

  // re-apply night stars
  if (!isDay) {
    document.getElementById('stars').style.opacity = '1';
    document.getElementById('skyBg').style.background =
      'linear-gradient(160deg, #000308 0%, #050d1a 50%, #0a1628 100%)';
  }
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', () => {
  const q = document.getElementById('searchInput').value.trim();
  if (q) searchCity(q);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) searchCity(q);
  }
});

// ── INIT: default city ────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  searchCity('London');
});
</script>
